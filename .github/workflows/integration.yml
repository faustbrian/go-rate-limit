name: Integration

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  valkey:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:9
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 ./valkey
        env:
          VALKEY_ADDRESS: 127.0.0.1:6379

  postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [14, 15, 16, 17, 18]
    services:
      postgres:
        image: postgres:${{ matrix.version }}
        env:
          POSTGRES_DB: rate_limit
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d rate_limit"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 30
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race -count=1 ./postgres
        env:
          POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/rate_limit?sslmode=disable
