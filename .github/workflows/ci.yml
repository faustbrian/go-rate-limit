name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - run: make fmt-check tidy vet lint staticcheck nilaway docs api vuln workflow

  tests:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:9
        options: --health-cmd "valkey-cli ping" --health-interval 2s --health-retries 30
        ports: [6379:6379]
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: rate_limit
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d rate_limit"
          --health-interval 2s
          --health-retries 30
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - run: make unit coverage race fuzz
        env: &backend-env
          POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/rate_limit?sslmode=disable
          VALKEY_ADDRESS: 127.0.0.1:6379

  mutation:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:9
        options: --health-cmd "valkey-cli ping" --health-interval 2s --health-retries 30
        ports: [6379:6379]
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: rate_limit
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d rate_limit"
          --health-interval 2s
          --health-retries 30
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - run: make mutation
        env: *backend-env

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version-file: go.mod
          cache: true
      - run: make benchmark | tee benchmark.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: benchmark
          path: benchmark.txt
